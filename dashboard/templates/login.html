<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Dashboard - Login</title>
<style>
:root { --bg: #0d1117; --bg2: #161b22; --border: #30363d; --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff; --red: #f85149; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; }
h1 { font-size: 20px; margin-bottom: 8px; }
p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
input[type="password"] { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; margin-bottom: 16px; }
input:focus { outline: none; border-color: var(--accent); }
button { width: 100%; padding: 10px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
button:hover { opacity: .9; }
.error { color: var(--red); font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="login-box">
  <h1>Agent Dashboard</h1>
  <p>Enter your dashboard token to continue.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/login">
    <label for="token">Token</label>
    <input type="password" id="token" name="token" placeholder="DASHBOARD_TOKEN" autofocus required>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
