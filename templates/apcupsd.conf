# =============================================================================
# apcupsd.conf - UPS Monitoring Configuration
# Copy to /etc/apcupsd/apcupsd.conf
# Adjust DEVICE for your UPS connection
# =============================================================================

## General configuration
UPSNAME agent-ups
UPSCABLE usb
UPSTYPE usb
DEVICE

## Network (local only)
NETSERVER on
NISIP 127.0.0.1
NISPORT 3551

## Shutdown behavior
# Battery remaining % to trigger shutdown
BATTERYLEVEL 15
# Minutes remaining to trigger shutdown
MINUTES 5
# Seconds on battery before shutdown (0 = disabled)
TIMEOUT 300

## Logging
STATTIME 60
STATFILE /var/log/apcupsd.status
LOGSTATS on
DATATIME 60

## Events
# Script called on power events
SCRIPTDIR /etc/apcupsd

## Self-test interval (14 days)
SELFTEST 336
