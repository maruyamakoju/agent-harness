# =============================================================================
# docker-compose.yml - 24/7 Autonomous Coding Agent
# Auth: Claude Max Plan ($200/mo) via 'claude login'
# =============================================================================

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coding-agent
    hostname: coding-agent
    restart: unless-stopped

    # GPU access for Ollama / local ML workloads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Environment
    environment:
      # API key is optional - Max plan uses 'claude login' instead
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GH_TOKEN=${GITHUB_TOKEN}
      - HARNESS_DIR=/harness
      - WORKSPACES_DIR=/workspaces
      - POLL_INTERVAL=30
      - TZ=Asia/Tokyo
      - HOME=/home/agent
      # Quota management
      - MAX_JOBS_PER_DAY=${MAX_JOBS_PER_DAY:-20}
      - MAX_PARALLEL_JOBS=${MAX_PARALLEL_JOBS:-2}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-sonnet-4-6}
      # GitHub Issue → auto-job (space-separated repo list)
      - AGENT_WATCH_REPOS=${AGENT_WATCH_REPOS:-}

    # Volume mounts
    volumes:
      # Job queue (host <-> container)
      - ./jobs:/harness/jobs
      # Logs (persisted on host)
      - ./logs:/harness/logs
      # Claude Code auth session (persisted across container restarts)
      # This is where 'claude login' stores the session token
      - claude-config:/home/agent/.claude
      # SSH key for git push (read-only)
      # On Ubuntu host, default: /home/agent/.ssh/id_ed25519
      - ${SSH_KEY_PATH:-/home/agent/.ssh/id_ed25519}:/home/agent/.ssh/id_ed25519:ro
      - ${SSH_KEY_PATH:-/home/agent/.ssh/id_ed25519}.pub:/home/agent/.ssh/id_ed25519.pub:ro
      # Config (auto-queue templates, etc.)
      - ./config:/harness/config
      # Workspaces (ephemeral)
      - agent-workspaces:/workspaces

    # Network
    networks:
      - agent-net

    dns:
      - 1.1.1.1
      - 8.8.8.8

    # Security
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true

    tmpfs:
      - /tmp:size=2G

    # Health check
    healthcheck:
      test: ["CMD", "bash", "-c", "test -f /harness/logs/heartbeat.json && test $$(( $$(date +%s) - $$(date -r /harness/logs/heartbeat.json +%s) )) -lt 300"]
      interval: 60s
      timeout: 10s
      start_period: 60s
      retries: 3

    # Ollama on host
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Web dashboard for monitoring agent
  dashboard:
    build: ./dashboard
    container_name: agent-dashboard
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - HARNESS_DIR=/harness
      - TZ=Asia/Tokyo
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GH_TOKEN=${GITHUB_TOKEN:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-sonnet-4-6}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - MAX_PENDING_JOBS=${MAX_PENDING_JOBS:-0}
    volumes:
      - ./jobs:/harness/jobs:ro
      - ./logs:/harness/logs:ro
      - ./jobs/pending:/harness/jobs/pending  # write for job submission
      - ./config:/harness/config
    networks:
      - agent-net
    depends_on:
      agent:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/api/status')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  agent-workspaces:
    driver: local
  claude-config:
    driver: local

networks:
  agent-net:
    driver: bridge
