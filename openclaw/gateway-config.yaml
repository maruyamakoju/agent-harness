# OpenClaw Gateway Configuration
# Controls scheduling, routing, and tool definitions for the Product Forge.

gateway:
  name: product-forge-gateway
  version: "1.0.0"
  listen: ":8090"

# ACP Session Routing
routing:
  harness_api: "http://dashboard:7860"
  auth_header: "Bearer ${DASHBOARD_TOKEN}"

# Cron Schedules
cron:
  # Daily morning summary at 8:00 AM
  - name: daily-summary
    schedule: "0 8 * * *"
    tool: daily-summary
    params:
      notify: true
      channels: ["telegram", "discord"]

  # Health audit every 4 hours
  - name: health-audit
    schedule: "0 */4 * * *"
    tool: get-progress
    params:
      check_stall: true
      stall_threshold_hours: 2

  # Log rotation at midnight
  - name: log-rotation
    schedule: "0 0 * * *"
    action: rotate-logs
    params:
      max_age_days: 30
      compress: true

  # Metrics aggregation at midnight
  - name: metrics-aggregation
    schedule: "5 0 * * *"
    action: aggregate-metrics
    params:
      output: "/harness/logs/daily-metrics/"

# Chat integrations
chat:
  telegram:
    enabled: ${TELEGRAM_BOT_TOKEN:+true}
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    allowed_chat_ids: []  # empty = allow all
    command_prefix: "/"

  discord:
    enabled: ${DISCORD_BOT_TOKEN:+true}
    bot_token: "${DISCORD_BOT_TOKEN}"
    allowed_guild_ids: []
    command_prefix: "!"

# Browser tool integration (for staging screenshots)
browser:
  enabled: false
  headless: true
  viewport: "1280x720"
  screenshot_dir: "/harness/logs/screenshots/"

# Tool definitions directory
tools_dir: "/config/tools"
